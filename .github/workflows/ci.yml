name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - run: uv run ruff check app tests
      - run: "APP_ENV=test DATABASE_URL=sqlite+pysqlite:///:memory: RUN_STARTUP_CHECKS=false uv run pytest"
      - run: "APP_ENV=test DATABASE_URL=sqlite+pysqlite:///:memory: RUN_STARTUP_CHECKS=false uv run python -c \"from app.core.app import create_app; create_app()\""
      - run: uv run alembic heads
